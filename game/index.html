<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Andriotti — Sistema de Agendamentos</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">A</div>
      <div class="brand-text">
        <span class="brand-name">Andriotti</span>
        <span class="brand-tag">Agendamentos</span>
      </div>
    </div>

    <div class="sidebar-section-label">MENU</div>
    <nav class="sidebar-nav">
      <a class="nav-item active" data-view="dashboard" onclick="App.navigate('dashboard')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a class="nav-item" data-view="equipes" onclick="App.navigate('equipes')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Equipes
        <span class="nav-badge" id="badge-equipes">0</span>
      </a>
      <a class="nav-item" data-view="agendamentos" onclick="App.navigate('agendamentos')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Agendamentos
        <span class="nav-badge" id="badge-agend">0</span>
      </a>
    </nav>

    <div class="sidebar-section-label" style="margin-top:1.5rem">EQUIPES</div>
    <div class="sidebar-teams" id="sidebar-teams"></div>

    <div class="sidebar-footer">
      <div class="footer-user">
        <div class="footer-avatar">AD</div>
        <div>
          <div class="footer-name">Andriotti</div>
          <div class="footer-role">Administrador</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-wrap">

    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-title" id="topbar-title">Dashboard</div>
        <div class="topbar-breadcrumb" id="topbar-bc">Visão geral do sistema</div>
      </div>
      <div class="topbar-actions">
        <div class="search-box">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="globalSearch" placeholder="Buscar cliente, CPF..." oninput="App.globalSearch(this.value)" />
        </div>
        <button class="btn-primary" id="topbar-btn" onclick="App.primaryAction()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nova Equipe
        </button>
      </div>
    </header>

    <!-- VIEWS -->
    <div class="content" id="content">
      <!-- injected by JS -->
    </div>
  </div>

  <!-- MODAL CONTAINER -->
  <div id="modal-bg" class="modal-bg hidden" onclick="Modal.closeOnBg(event)">
    <div class="modal-box" id="modal-box">
      <div class="modal-head">
        <div class="modal-title" id="modal-title">Modal</div>
        <button class="modal-close-btn" onclick="Modal.close()">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <script src="js/data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
